<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Account Deletion - DinkUp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5; padding: 20px; line-height: 1.6; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 40px; }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a1a; }
        .subtitle { font-size: 16px; color: #666; }
        .content { margin-bottom: 32px; }
        .content p { margin-bottom: 16px; color: #555; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: #639922; box-shadow: 0 0 0 3px rgba(99,153,34,0.1); }
        textarea { min-height: 120px; }
        .submit-btn { background-color: #639922; color: white; padding: 14px 28px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: background-color 0.2s; }
        .submit-btn:hover { background-color: #507019; }
        .success-message { display: none; background-color: #e8f5e9; border: 1px solid #4caf50; color: #2e7d32; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
        .footer { border-top: 1px solid #eee; margin-top: 40px; padding-top: 20px; text-align: center; font-size: 14px; color: #999; }
        .footer a { color: #639922; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏓</div>
            <h1>Delete Your Account</h1>
            <p class="subtitle">We're sorry to see you go. Your data will be permanently deleted.</p>
        </div>
        <div class="content">
            <p>To request deletion of your DinkUp account, please provide your email:</p>
        </div>
        <form id="deleteForm">
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
                <label for="reason">Reason (Optional)</label>
                <textarea id="reason" name="reason" placeholder="Your feedback..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Request Deletion</button>
        </form>
        <div class="footer">
            <p>© 2026 DinkUp | <a href="/privacy-policy.html">Privacy Policy</a></p>
        </div>
    </div>
    <script>
        document.getElementById('deleteForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('✓ Deletion request received. We'll process it within 30 days.');
        });
    </script>
</body>
</html>
