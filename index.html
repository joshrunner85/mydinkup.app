
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DinkUp: Fun, Food & Drinks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        .container { text-align: center; max-width: 480px; }
        .logo { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 28px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
        .tagline { font-size: 16px; color: #666; margin-bottom: 48px; }
        .badges { display: flex; gap: 12px; justify-content: center; margin-bottom: 48px; flex-wrap: wrap; }
        .badge {
            background: #1a1a1a;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }
        .badge:hover { background: #333; }
        .badge.coming-soon { background: #888; cursor: default; }
        .links { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
        .links a { font-size: 14px; color: #639922; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .footer { margin-top: 48px; font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏓</div>
        <h1>DinkUp: Fun, Food & Drinks</h1>
        <p class="tagline">The easiest way to organize your pickleball crew.</p>

        <div class="badges">
            <a href="https://apps.apple.com/app/dinkup/id6783207973" class="badge">⬇ Download on App Store</a>
            <span class="badge coming-soon">Google Play — Coming Soon</span>
        </div>

        <div class="links">
            <a href="/privacy-policy.html">Privacy Policy</a>
            <a href="/delete-account.html">Delete Account</a>
            <a href="mailto:joshrunner85@gmail.com">Feedback</a>
        </div>

        <p class="footer">© 2026 DinkUp. All rights reserved.</p>
    </div>
</body>
</html>
